name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, format, typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck

  test:
    name: Test (Node + Workers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm test:workers
      - run: pnpm --filter example-claude-code demo:2
      # Dogfood scanner on production CLI sources (tests embed synthetic secrets on purpose).
      - name: Dogfood tailrace scan
        run: |
          CLI=packages/cli/dist/cli.cjs
          node "$CLI" scan packages/cli/src/internal
          node "$CLI" scan packages/cli/src/templates
          node "$CLI" scan packages/cli/src/cli.ts
          node "$CLI" scan packages/cli/src/index.ts
          for f in packages/cli/src/commands/*.ts; do
            case "$f" in *.test.ts) continue ;; esac
            node "$CLI" scan "$f"
          done

  gates:
    name: Size + benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm size
      - run: pnpm bench

  audit:
    name: Dependency review
    runs-on: ubuntu-latest
    # dependency-review-action compares the PR's base/head, so it only runs on pull_request.
    # Standing inventory is covered by Dependabot on the default branch.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  docs:
    name: Docs site build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Turborepo ^build ensures @tailrace/core (and peers) build before apps/web,
      # so twoslash snippets that import workspace packages type-check in CI.
      - run: pnpm turbo run build --filter=@tailrace/web...
